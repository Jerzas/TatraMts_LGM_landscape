<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test Info Hotspot Hover</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            padding: 50px;
            background: #222;
        }
        .test-hotspot {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 100px;
            border: 1px solid white;
        }
    </style>
</head>
<body class="desktop no-touch">
    <div class="test-hotspot">
        <div class="hotspot info-hotspot info-hotspot-has-details">
            <div class="info-hotspot-header">
                <div class="info-hotspot-icon-wrapper">
                    <img src="img/info.png" class="info-hotspot-icon">
                </div>
                <div class="info-hotspot-title-wrapper">
                    <div class="info-hotspot-title">Gerlachovský štít 2654</div>
                </div>
            </div>
            <div class="info-hotspot-text">The highest mountain in the Tatras and Carpathians</div>
        </div>
    </div>
    <p>Najedź myszką na hotspot powyżej. Tekst powinien się pojawić.</p>
</body>
</html>
